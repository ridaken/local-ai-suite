# Phase 1 infrastructure: kiwix-serve only.
# Qdrant / SearXNG are added in later phases (see plan).
#
# Data is bind-mounted from ZIM_DIR on your data drive (see config/.env),
# so nothing large is stored inside the repo. Start with:
#   docker compose --env-file config/.env up -d
services:
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: las-kiwix
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Serve every *.zim found in ZIM_DIR. Add/remove ZIMs on disk, then restart.
    command: ["--port", "8080", "*.zim"]
    volumes:
      - "${ZIM_DIR}:/data:ro"
    working_dir: /data
