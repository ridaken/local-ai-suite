services:
  config-validator:
    build: .
    command: ["python", "-m", "mcp_gateway.validate_config"]
    environment:
      ADMIN_TOKEN_FILE: /run/secrets/admin_token
      MCP_API_KEY_FILE: /run/secrets/mcp_api_key
    secrets:
      - admin_token
      - mcp_api_key
    restart: "no"

  state-init:
    build: .
    command: ["python", "-m", "mcp_gateway.state_init"]
    depends_on:
      config-validator:
        condition: service_completed_successfully
    environment:
      ZIM_DIR: /corpus
      STATE_DIR: /state
      SETTINGS_DB: /state/settings.db
    volumes:
      - "${ZIM_DIR:-./data/zim}:/corpus:ro"
      - "${STATE_DIR:-./data/state}:/state"
    restart: "no"

  library-init:
    image: busybox:1.37
    command:
      - sh
      - -c
      - "test -f /data/library.xml || printf '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<library version=\"20110515\"></library>\n' > /data/library.xml"
    volumes:
      - "${ZIM_DIR:-./data/zim}:/data"
    networks: [las-backend]
    restart: "no"

  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    restart: unless-stopped
    depends_on:
      library-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${KIWIX_PORT:-8080}:8080"
    command: ["--library", "--monitorLibrary", "/data/library.xml"]
    volumes:
      - "${ZIM_DIR:-./data/zim}:/data:ro"
    working_dir: /data
    networks:
      - las-backend
      - las-host

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    volumes:
      - "${QDRANT_STORAGE:-./data/qdrant}:/qdrant/storage"
    networks:
      - las-backend
      - las-host

  gateway:
    build: .
    restart: unless-stopped
    depends_on:
      state-init:
        condition: service_completed_successfully
      kiwix:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "127.0.0.1:${MCP_PORT:-8090}:8090"
    env_file:
      - path: config/.env
        required: false
    environment:
      LAS_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8090"
      MCP_API_KEY_FILE: /run/secrets/mcp_api_key
      KAGI_API_KEY_FILE: /run/secrets/kagi_api_key
      NCBI_API_KEY_FILE: /run/secrets/ncbi_api_key
      MCP_ALLOWED_HOSTS: "127.0.0.1:*,localhost:*,[::1]:*,las-gateway:*,gateway:*"
      KIWIX_URL: http://kiwix:8080
      KIWIX_PUBLIC_URL: ${KIWIX_PUBLIC_URL:-http://localhost:8080}
      QDRANT_URL: http://qdrant:6333
      EMBED_URL: http://host.docker.internal:8081/v1/embeddings
      RERANK_URL: http://host.docker.internal:8082/v1/rerank
      ZIM_DIR: /corpus
      LIBRARY_XML_PATH: /corpus/library.xml
      STATE_DIR: /state
      SETTINGS_DB: /state/settings.db
    secrets:
      - mcp_api_key
      - kagi_api_key
      - ncbi_api_key
    volumes:
      - "${ZIM_DIR:-./data/zim}:/corpus:ro"
      - "${STATE_DIR:-./data/state}:/state:ro"
    networks:
      las-backend: {}
      las-clients:
        aliases: [las-gateway]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

  admin:
    build: .
    command: ["python", "-m", "mcp_gateway.admin_server"]
    restart: unless-stopped
    depends_on:
      state-init:
        condition: service_completed_successfully
      library-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8091}:8091"
    env_file:
      - path: config/.env
        required: false
    environment:
      ADMIN_HOST: 0.0.0.0
      ADMIN_PORT: "8091"
      ADMIN_TOKEN_FILE: /run/secrets/admin_token
      KAGI_API_KEY_FILE: /run/secrets/kagi_api_key
      NCBI_API_KEY_FILE: /run/secrets/ncbi_api_key
      ADMIN_ALLOWED_HOSTS: "localhost,127.0.0.1,[::1],las-admin"
      ADMIN_ALLOWED_ORIGINS: "http://localhost:${ADMIN_PORT:-8091},http://127.0.0.1:${ADMIN_PORT:-8091}"
      KIWIX_URL: http://kiwix:8080
      QDRANT_URL: http://qdrant:6333
      EMBED_URL: http://host.docker.internal:8081/v1/embeddings
      RERANK_URL: http://host.docker.internal:8082/v1/rerank
      ZIM_DIR: /corpus
      KIWIX_DATA_DIR: /data
      LIBRARY_XML_PATH: /corpus/library.xml
      STATE_DIR: /state
      SETTINGS_DB: /state/settings.db
    secrets:
      - admin_token
      - kagi_api_key
      - ncbi_api_key
    volumes:
      - "${ZIM_DIR:-./data/zim}:/corpus"
      - "${STATE_DIR:-./data/state}:/state"
    networks:
      - las-backend
      - las-egress
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8091/healthz')"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  las-backend:
    name: las-backend
    internal: true
  las-clients:
    name: las-clients
  las-egress:
    name: las-egress
  las-host:
    name: las-host

secrets:
  admin_token:
    file: ./config/secrets/admin_token.txt
  mcp_api_key:
    file: ./config/secrets/mcp_api_key.txt
  kagi_api_key:
    file: ./config/secrets/kagi_api_key.txt
  ncbi_api_key:
    file: ./config/secrets/ncbi_api_key.txt
