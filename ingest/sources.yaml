# Curated corpora to embed into Qdrant (the vector tier). Keep this list BOUNDED —
# your own repos, notes, and selected docs — not giant public corpora (those stay
# as Kiwix ZIMs). Edit roots to point at what you want retrievable, then run:
#   .venv/Scripts/python.exe -m ingest.ingest
#
# Each source needs:
#   id       stable unique name — never reuse or recycle it; it identifies this
#            source across renames and moves. Required.
#   root     folder to walk
#   label    prefix used in citations (must be unique across sources)
#   include/exclude  globs relative to root (.git/.venv/node_modules/__pycache__
#            are always skipped)
sources:
  - id: local-ai-suite
    root: .
    label: local-ai-suite
    include:
      - "**/*.py"
      - "**/*.md"
      - "**/*.yml"
      - "**/*.yaml"
    exclude:
      - "**/.venv/**"

  # Add more repos/notes, e.g.:
  # - id: scanfiler
  #   root: ../scanfiler
  #   label: scanfiler
  #   include: ["**/*.py", "**/*.md"]
